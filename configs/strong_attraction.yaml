box:
  length: 20.0

simulation:
  n_particles: 1000
  dt: 0.001
  n_steps: 10000
  diffusion: 1.0
  seed: 77

particles:
  sigma: 1.0
  k_rep: 100.0
  kT: 1.0

species:
  - name: A
    sigma: 1.0
    diffusion: 1.0
    fraction: 0.5
  - name: B
    sigma: 1.0
    diffusion: 1.0
    fraction: 0.5

attractions:
  - species_a: A
    species_b: B
    epsilon: 5.0        # stronger well
    cutoff: 2.0

reactions: []           # no binding — only pure attraction clustering

output:
  save_entry: 100